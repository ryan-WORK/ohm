  <path d="M188 258 Q164 298 150 348" stroke="#d4956a" stroke-width="22" stroke-linecap="round" fill="none"/>
  <path d="M312 258 Q336 298 350 348" stroke="#d4956a" stroke-width="22" stroke-linecap="round" fill="none"/>
  <!-- Shirt sleeves over arms -->
  <path d="M188 258 Q172 282 162 310" stroke="#ec4899" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.85"/>
  <path d="M312 258 Q328 282 338 310" stroke="#7c3aed" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.85"/>
  <!-- Hands -->
  <circle cx="148" cy="350" r="14" fill="#d4956a"/>
  <circle cx="140" cy="342" r="8"  fill="#d4956a"/>
  <circle cx="352" cy="350" r="14" fill="#d4956a"/>
  <circle cx="360" cy="342" r="8"  fill="#d4956a"/>

  <!-- Neck -->
  <path d="M234 230 Q250 236 266 230 L268 248 Q250 255 232 248 Z" fill="#d4956a"/>

