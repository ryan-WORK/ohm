  <circle cx="282" cy="294" r="20" fill="#00ff88" opacity="0.18"/>
  <circle cx="226" cy="318" r="16" fill="#f472b6" opacity="0.18"/>
  <circle cx="270" cy="264" r="13" fill="#60a5fa" opacity="0.2"/>
