<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 520" width="500" height="520">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <radialGradient id="auraGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#4f46e5" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="45%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="skinGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f5c6a0"/>
      <stop offset="100%" stop-color="#d4956a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="520" fill="url(#bgGrad)" rx="24"/>

