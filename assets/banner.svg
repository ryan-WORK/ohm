  <ellipse cx="250" cy="184" rx="56" ry="59" fill="url(#skinGrad)"/>

  <!-- Hair top -->
  <path d="M195 168 Q210 130 250 124 Q290 130 305 168 Q286 150 250 148 Q214 150 195 168Z" fill="#2d1b0e"/>

  <!-- Headband -->
  <path d="M196 175 Q250 160 304 175 Q299 188 250 181 Q201 188 196 175Z" fill="#f97316"/>
  <path d="M196 175 Q250 166 304 175 Q299 170 250 168 Q201 170 196 175Z" fill="#fbbf24" opacity="0.38"/>
