  <text x="392" y="148" font-family="sans-serif" font-size="24" fill="#f472b6" opacity="0.55">☮</text>
  <text x="40" y="308" font-family="monospace" font-size="11" fill="#fbbf24" opacity="0.45">.sock</text>
  <text x="408" y="288" font-family="monospace" font-size="11" fill="#60a5fa" opacity="0.45">LSP</text>
  <text x="62" y="198" font-family="monospace" font-size="12" fill="#c084fc" opacity="0.42">∿ ohm</text>
  <text x="408" y="375" font-family="sans-serif" font-size="16" fill="#34d399" opacity="0.45">∞</text>
  <text x="392" y="212" font-family="sans-serif" font-size="14" fill="#fbbf24" opacity="0.45">✦</text>
  <text x="52" y="388" font-family="sans-serif" font-size="14" fill="#f97316" opacity="0.45">✦</text>

