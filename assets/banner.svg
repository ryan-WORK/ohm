  <path d="M260 198 Q269 193 277 198" stroke="#4a3728" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Lashes -->
  <line x1="225" y1="198" x2="224" y2="201" stroke="#4a3728" stroke-width="1.2"/>
  <line x1="231" y1="195" x2="231" y2="198" stroke="#4a3728" stroke-width="1.2"/>
  <line x1="238" y1="198" x2="239" y2="201" stroke="#4a3728" stroke-width="1.2"/>
  <line x1="262" y1="198" x2="261" y2="201" stroke="#4a3728" stroke-width="1.2"/>
  <line x1="269" y1="195" x2="269" y2="198" stroke="#4a3728" stroke-width="1.2"/>
  <line x1="275" y1="198" x2="276" y2="201" stroke="#4a3728" stroke-width="1.2"/>

  <!-- Nose -->
  <path d="M246 206 Q250 214 254 206" stroke="#c8866a" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Smile -->
  <path d="M234 222 Q250 235 266 222" stroke="#c8866a" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Rosy cheeks -->
  <ellipse cx="224" cy="212" rx="13" ry="8" fill="#f472b6" opacity="0.18"/>
  <ellipse cx="276" cy="212" rx="13" ry="8" fill="#f472b6" opacity="0.18"/>

  <!-- Front hair wisps -->
  <path d="M198 174 Q190 198 188 218" stroke="#2d1b0e" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M302 174 Q310 198 312 218" stroke="#2d1b0e" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Title -->
  <text x="250" y="466" font-family="Georgia, serif" font-size="30" fill="#a78bfa" opacity="0.92" text-anchor="middle" letter-spacing="10">Ω ohm</text>
  <text x="250" y="490" font-family="monospace" font-size="11" fill="#6b7280" text-anchor="middle" letter-spacing="2">one server. no resistance.</text>
</svg>
