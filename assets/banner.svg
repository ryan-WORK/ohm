  <ellipse cx="250" cy="295" rx="168" ry="158" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.22"/>
  <ellipse cx="250" cy="295" rx="136" ry="126" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.28"/>

  <!-- Floating labels -->
