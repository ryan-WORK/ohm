  <circle cx="92"  cy="158" r="2.5" fill="#ffd93d" opacity="0.7"/>
  <circle cx="408" cy="238" r="2"   fill="#ff6b6b" opacity="0.6"/>
  <circle cx="75"  cy="268" r="1.8" fill="#00ff88" opacity="0.6"/>
  <circle cx="422" cy="328" r="2.5" fill="#c084fc" opacity="0.65"/>
  <circle cx="108" cy="422" r="1.8" fill="#6bceff" opacity="0.55"/>
  <circle cx="392" cy="432" r="1.8" fill="#ffd93d" opacity="0.55"/>
  <circle cx="142" cy="132" r="1.5" fill="#f472b6" opacity="0.5"/>
  <circle cx="358" cy="122" r="1.5" fill="#34d399" opacity="0.5"/>

  <!-- Hair back layer -->
  <path d="M196 168 Q166 188 154 245 Q142 300 148 375 Q165 380 172 364 Q166 305 176 252 Q184 212 202 186 Z" fill="#2d1b0e"/>
  <path d="M304 168 Q334 188 346 245 Q358 300 352 375 Q335 380 328 364 Q334 305 324 252 Q316 212 298 186 Z" fill="#2d1b0e"/>

