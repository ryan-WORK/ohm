  <circle cx="250" cy="288" r="19" fill="none" stroke="rgba(255,255,255,0.32)" stroke-width="2"/>
  <line x1="250" y1="269" x2="250" y2="307" stroke="rgba(255,255,255,0.32)" stroke-width="2"/>
  <line x1="250" y1="307" x2="236" y2="294" stroke="rgba(255,255,255,0.32)" stroke-width="2"/>
  <line x1="250" y1="307" x2="264" y2="294" stroke="rgba(255,255,255,0.32)" stroke-width="2"/>

