name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: build
        run: go build ./...

      - name: test
        run: go test ./...

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: build binaries
        run: |
          GOOS=linux  GOARCH=amd64 go build -o bin/ohm-linux-amd64  .
          GOOS=linux  GOARCH=arm64 go build -o bin/ohm-linux-arm64  .
          GOOS=darwin GOARCH=amd64 go build -o bin/ohm-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -o bin/ohm-darwin-arm64 .
          cd bin && sha256sum ohm-* > checksums.txt

      - name: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            bin/ohm-* bin/checksums.txt \
            --title "${{ github.ref_name }}" \
            --generate-notes
